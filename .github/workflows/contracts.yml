name: Contracts CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/contracts.yml'
  pull_request:
    paths:
      - 'packages/contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/contracts.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint-and-test:
    name: Clippy + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-contracts-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-contracts-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --package swiftq-leaderboard --package swiftq-quiz-pool --all-targets -- -D warnings

      - name: Run contract tests
        run: cargo test --package swiftq-leaderboard --package swiftq-quiz-pool

      - name: Build contracts (WASM)
        run: cargo build --target wasm32-unknown-unknown --release --package swiftq-leaderboard --package swiftq-quiz-pool
